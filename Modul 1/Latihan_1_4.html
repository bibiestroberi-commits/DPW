<!DOCTYPE html>
<html>
<head>
    <title>Halaman HTML saya - Latihan 4</title>
</head>
<body>
    <h1>Latihan Untuk Membuat List</h1>

    <ol type="1">
        <li>Jenis Buah:</li>
        <li>Jenis Makanan:</li>
        <li>Gender:</li>
    </ol>

    <ul>
        <li>Stawberry</li>
        <li>Cerry</li>
        <li>Blueberry</li>
        <li>Rasberry</li>
    </ul>

    <hr>

    <ol type="A">
        <li>Jenis Buah:
            <ul>
                <li>Pir</li>
                <li>Langsat</li>
            </ul>
        </li>
        <li>Jenis Makanan:
            <ol type="1">
                <li>Sate Kelinci</li>
                <li>Oseng Bekicot</li>
                <li>Gulai Biawak</li>
            </ol>
        </li>
        <li>Gender:
            <ol type="a">
                <li>MAN</li>
                <li>WOMEN</li>
            </ol>
        </li>
    </ol>
</body>
</html>
